<div class="mindmap-wrapper">
  <svg #svgContainer class="mindmap-svg"></svg>
  <div class="mindmap-hint">
    Scroll to zoom &nbsp;·&nbsp; Drag canvas to pan &nbsp;·&nbsp; Click node to collapse/expand
  </div>
  <div class="mm-sr-only" aria-live="polite" aria-atomic="true">{{ liveMessage() }}</div>
</div>

@if (menuOpen()) {
  <mm-context-menu
    [entries]="menuEntries()"
    [x]="menuX()"
    [y]="menuY()"
    [theme]="theme()"
    (closed)="onContextMenuClosed($event)" />
}
